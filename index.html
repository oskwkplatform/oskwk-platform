<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oskwk · 极致化平台</title>
    <style>
        :root {
            --glass: rgba(255,255,255,0.45);
            --glass-border: rgba(255,255,255,0.5);
            --accent: #4f46e5;
            --accent-light: rgba(79,70,229,0.12);
            --shadow: 0 12px 40px rgba(0,0,0,0.15);
            --radius-xl: 28px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            color: #111; min-height: 100vh;
        }
        body::after {
            content:''; position:fixed; inset:0; background:rgba(0,0,0,0.25); backdrop-filter:blur(8px); z-index:-1;
        }
        .loading-screen {
            position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center;
            z-index:9999; color:#fff; font-size:56px; font-weight:700; letter-spacing:6px;
            transition: opacity 0.5s;
        }
        .hero {
            height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:#fff; text-align:center; background: linear-gradient(135deg, rgba(79,70,229,0.7), rgba(236,72,153,0.6));
        }
        .hero h1 { font-size:clamp(40px,8vw,72px); text-shadow:0 4px 30px rgba(0,0,0,0.3); margin-bottom:20px; }
        .hero button {
            background:#fff; color:var(--accent); border:none; padding:16px 52px; border-radius:60px;
            font-size:18px; font-weight:600; cursor:pointer; margin-top:32px; box-shadow:var(--shadow);
        }
        .toast-fixed {
            position:fixed; top:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8);
            color:#fff; padding:12px 28px; border-radius:40px; z-index:999; display:none; white-space:nowrap;
        }
        .main-layout { display:none; padding:100px 20px 40px; max-width:1200px; margin:0 auto; }
        .main-layout.active { display:block; }
        .nav-glass {
            position:fixed; top:0; left:0; right:0; z-index:100; background:var(--glass); backdrop-filter:blur(30px);
            display:flex; gap:6px; padding:14px 20px; overflow-x:auto; border-bottom:1px solid var(--glass-border);
            box-shadow:0 4px 20px rgba(0,0,0,0.05);
        }
        .nav-glass span {
            font-weight:700; font-size:18px; color:var(--accent); margin-right:12px; white-space:nowrap;
        }
        .nav-glass button {
            background:none; border:none; padding:10px 18px; border-radius:40px; font-size:13px; color:#333; white-space:nowrap;
        }
        .nav-glass button.active { background:var(--accent-light); color:var(--accent); font-weight:600; }
        .page { display:none; }
        .page.active { display:block; }
        .pg-hero {
            height:240px; border-radius:var(--radius-xl); margin-bottom:24px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:36px; font-weight:700; background-size:cover; background-position:center;
            position:relative; overflow:hidden; box-shadow:var(--shadow);
        }
        .pg-hero::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.3); backdrop-filter:blur(2px); }
        .pg-hero span { position:relative; z-index:1; text-shadow:0 2px 16px rgba(0,0,0,0.5); }
        .card {
            background:var(--glass); backdrop-filter:blur(25px); border-radius:var(--radius-xl); padding:36px;
            margin-bottom:24px; border:1px solid var(--glass-border); box-shadow:0 8px 32px rgba(0,0,0,0.08);
        }
        .article-item {
            background:rgba(255,255,255,0.55); backdrop-filter:blur(12px); border-radius:20px; padding:24px; margin-bottom:20px;
            border:1px solid rgba(255,255,255,0.5);
        }
        .comment-section { margin-top:16px; padding-top:14px; border-top:1px solid rgba(0,0,0,0.05); }
        .comment-section input { padding:10px; border-radius:12px; border:1px solid #ddd; width:70%; }
        .comment-section button { padding:10px 16px; border-radius:12px; background:var(--accent); color:#fff; border:none; cursor:pointer; }
        .channel-grid { display:grid; gap:14px; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); }
        .channel-card {
            background:var(--glass); backdrop-filter:blur(16px); padding:24px; border-radius:20px; cursor:pointer;
            border:1px solid var(--glass-border); transition:0.2s; text-align:center;
        }
        .channel-card:hover { background:rgba(255,255,255,0.7); }
        .chat-box { height:60vh; overflow-y:auto; background:rgba(255,255,255,0.3); border-radius:20px; padding:16px; margin-top:16px; }
        .msg { max-width:80%; padding:12px 16px; border-radius:20px; margin-bottom:10px; position:relative; word-break:break-word; }
        .msg.mine { background:var(--accent); color:#fff; margin-left:auto; border-bottom-right-radius:4px; }
        .msg.other { background:#fff; margin-right:auto; border-bottom-left-radius:4px; }
        .msg .time { font-size:10px; opacity:0.7; display:block; text-align:right; margin-top:4px; }
        .input-row { display:flex; gap:10px; margin-top:16px; }
        .input-row input { flex:1; padding:14px; border-radius:20px; border:1px solid #ccc; }
        .input-row button { padding:14px 24px; border-radius:20px; background:var(--accent); color:#fff; border:none; cursor:pointer; }
        .profile-stat {
            background:rgba(255,255,255,0.4); backdrop-filter:blur(12px); padding:20px; border-radius:18px;
            text-align:center; border:1px solid var(--glass-border);
        }
    </style>
</head>
<body>
<div class="loading-screen" id="loading">oskwk</div>

<section class="hero" id="hero">
    <h1>专注于每一个细节<br>呈现极致视觉体验</h1>
    <button onclick="openRegister()">加入我们 →</button>
</section>

<div class="toast-fixed" id="toast"></div>

<!-- 注册弹窗 -->
<div id="registerModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:200; align-items:center; justify-content:center;" onclick="if(event.target===this)closeRegister()">
    <div style="background:rgba(255,255,255,0.9); backdrop-filter:blur(20px); border-radius:32px; padding:40px; max-width:400px; width:100%;">
        <h2 style="text-align:center; margin-bottom:24px;">加入 oskwk</h2>
        <input id="regEmail" placeholder="邮箱" style="width:100%; padding:14px; border-radius:14px; border:1px solid #ddd; margin-bottom:14px;">
        <input id="regNick" placeholder="昵称" style="width:100%; padding:14px; border-radius:14px; border:1px solid #ddd; margin-bottom:20px;">
        <button onclick="doRegister()" style="width:100%; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:14px; font-size:16px; margin-bottom:8px;">确认加入</button>
        <button onclick="closeRegister()" style="width:100%; padding:14px; background:#eee; border:none; border-radius:14px;">取消</button>
    </div>
</div>

<div class="main-layout" id="mainLayout">
    <nav class="nav-glass">
        <span>oskwk</span>
        <button class="active" onclick="switchTab('about')">关于oskwk</button>
        <button onclick="switchTab('discover')">最新发现</button>
        <button onclick="switchTab('study')">学术学习</button>
        <button onclick="switchTab('chat')">交流中心</button>
        <button onclick="switchTab('profile')">个人中心</button>
    </nav>

    <!-- 关于oskwk -->
    <div class="page active" id="tab-about">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80')"><span>关于oskwk</span></div>
        <div class="card">
            <button class="admin-btn" style="display:none; margin-bottom:20px; padding:12px 24px; border-radius:14px; background:var(--accent); color:#fff; border:none; cursor:pointer;" onclick="adminWriteArticle('about')">✍️ 发布文章</button>
            <div id="article-about">加载中...</div>
        </div>
    </div>
    <!-- 最新发现 -->
    <div class="page" id="tab-discover">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1200&q=80')"><span>最新发现</span></div>
        <div class="card">
            <button class="admin-btn" style="display:none; margin-bottom:20px; padding:12px 24px; border-radius:14px; background:var(--accent); color:#fff; border:none; cursor:pointer;" onclick="adminWriteArticle('discover')">✍️ 发布文章</button>
            <div id="article-discover">加载中...</div>
        </div>
    </div>
    <!-- 学术学习 -->
    <div class="page" id="tab-study">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&w=1200&q=80')"><span>学术学习与讨论</span></div>
        <div class="card">
            <button class="admin-btn" style="display:none; margin-bottom:20px; padding:12px 24px; border-radius:14px; background:var(--accent); color:#fff; border:none; cursor:pointer;" onclick="adminWriteArticle('study')">✍️ 发布文章</button>
            <div id="article-study">加载中...</div>
        </div>
    </div>
    <!-- 交流中心 -->
    <div class="page" id="tab-chat">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?auto=format&fit=crop&w=1200&q=80')"><span>交流中心</span></div>
        <div class="card">
            <div id="channelSelector">
                <div class="channel-grid">
                    <div class="channel-card" onclick="joinRoom('大厅')">🏠<br>大厅</div>
                    <div class="channel-card" onclick="joinRoom('技术')">💻<br>技术</div>
                    <div class="channel-card" onclick="joinRoom('理论')">📖<br>理论</div>
                    <div class="channel-card" onclick="joinRoom('艺术')">🎨<br>艺术</div>
                    <div class="channel-card" onclick="joinPrivate()">🔒<br>私有房间</div>
                </div>
            </div>
            <div id="chatPanel" style="display:none;">
                <button onclick="leaveRoom()" style="padding:8px 20px; border-radius:40px; background:var(--glass); border:1px solid var(--glass-border); margin-bottom:10px;">← 返回频道列表</button>
                <div class="chat-box" id="chatBox"></div>
                <div class="input-row">
                    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
                    <button onclick="document.getElementById('imgUpload').click()">📷</button>
                    <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="uploadImg()">
                    <button onclick="sendMsg()">发送</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 个人中心 -->
    <div class="page" id="tab-profile">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=1200&q=80')"><span>个人中心</span></div>
        <div class="card">
            <h2 id="profileNick">昵称</h2>
            <p id="profileMail" style="color:#666;">邮箱</p>
            <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:16px; margin-top:28px;">
                <div class="profile-stat"><div style="font-size:24px; font-weight:700; color:var(--accent);" id="joinDays">0</div><div>加入天数</div></div>
                <div class="profile-stat"><div style="font-size:24px; font-weight:700; color:var(--accent);">VIP</div><div>等级</div></div>
                <div class="profile-stat"><div style="font-size:24px; font-weight:700; color:var(--accent);">∞</div><div>潜力</div></div>
            </div>
            <button onclick="doLogout()" style="margin-top:28px; padding:14px 28px; background:#ef4444; color:#fff; border:none; border-radius:14px; width:100%;">退出登录</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://ouejetzclopuuafmnbjq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_y72GfgNeGAGShil7rmurrQ_U3w_QeJL';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const ADMIN_EMAIL = '279933264@qq.com';  // 管理员邮箱（只有此邮箱能看到发布按钮）
    let currentUser = null;
    let currentRoom = null;
    let realtimeChannel = null;

    function toast(msg) {
        const t = document.getElementById('toast');
        if(!t) return;
        t.textContent = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
    function getEl(id) { return document.getElementById(id); }

    // ---------- 注册与登录持久化 ----------
    window.openRegister = () => getEl('registerModal').style.display = 'flex';
    window.closeRegister = () => getEl('registerModal').style.display = 'none';
    window.doRegister = function() {
        const email = getEl('regEmail').value.trim();
        const nick = getEl('regNick').value.trim();
        if(!email || !nick) return toast('请填写完整');
        currentUser = { email, nickname: nick, created_at: new Date().toISOString() };
        localStorage.setItem('oskwk_user', JSON.stringify(currentUser));
        getEl('registerModal').style.display = 'none';
        enterApp();
    };

    function enterApp() {
        getEl('loading').style.opacity = '0';
        setTimeout(() => getEl('loading').style.display = 'none', 500);
        getEl('mainLayout').classList.add('active');
        getEl('hero').style.display = 'none';
        updateProfile();
        loadArticlesByCategory('about');
        loadArticlesByCategory('discover');
        loadArticlesByCategory('study');
        if(currentUser.email === ADMIN_EMAIL) {
            document.querySelectorAll('.admin-btn').forEach(b => b.style.display = 'block');
        }
    }

    function updateProfile() {
        if(!currentUser) return;
        getEl('profileNick').textContent = currentUser.nickname;
        getEl('profileMail').textContent = currentUser.email;
        const diff = Math.max(1, Math.floor((Date.now() - new Date(currentUser.created_at).getTime())/86400000));
        getEl('joinDays').textContent = diff;
    }

    window.doLogout = function() {
        localStorage.removeItem('oskwk_user');
        location.reload();
    };

    // ---------- 标签切换 ----------
    window.switchTab = function(cat) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const page = document.getElementById('tab-' + cat);
        if(page) page.classList.add('active');
        document.querySelectorAll('.nav-glass button').forEach(b => {
            if(b.innerText.includes(getTabName(cat))) b.classList.add('active');
            else b.classList.remove('active');
        });
        if(cat !== 'chat' && currentRoom) {
            leaveRoom();
        }
    };
    function getTabName(cat) {
        const map = { about:'关于oskwk', discover:'最新发现', study:'学术学习', chat:'交流中心', profile:'个人中心' };
        return map[cat] || '';
    }

    // ---------- 文章模块 ----------
    async function loadArticlesByCategory(cat) {
        const container = getEl('article-' + cat);
        if(!container) return;
        const { data, error } = await supabase.from('articles').select('*').eq('category', cat).order('created_at', {ascending:false});
        if(error) { container.innerHTML = '<p>加载失败</p>'; return; }
        if(!data || data.length===0) { container.innerHTML = '<p>暂无文章</p>'; return; }
        container.innerHTML = data.map(a => `
            <div class="article-item">
                <h3>${a.title}</h3>
                <p>${a.content}</p>
                <small style="color:#888;">${a.author} · ${new Date(a.created_at).toLocaleString()}</small>
                <div class="comment-section" id="comment-${a.id}">
                    <strong>留言</strong>
                    <div id="commentList-${a.id}">加载中...</div>
                    <input id="commentInput-${a.id}" placeholder="写下你的想法...">
                    <button onclick="postComment(${a.id}, '${cat}')">发送</button>
                </div>
            </div>
        `).join('');
        data.forEach(a => loadComments(a.id));
    }

    async function loadComments(articleId) {
        const { data } = await supabase.from('comments').select('*').eq('article_id', articleId).order('created_at');
        const box = getEl('commentList-' + articleId);
        if(!box) return;
        box.innerHTML = (data||[]).map(c => `<p><b>${c.nickname}</b>: ${c.content} <small>${new Date(c.created_at).toLocaleTimeString()}</small></p>`).join('');
    }

    window.postComment = async function(articleId, cat) {
        if(!currentUser) return toast('请先登录');
        const input = getEl('commentInput-' + articleId);
        const content = input.value.trim();
        if(!content) return;
        await supabase.from('comments').insert({ article_id: articleId, nickname: currentUser.nickname, content });
        input.value = '';
        loadComments(articleId);
    };

    window.adminWriteArticle = function(cat) {
        const title = prompt('文章标题');
        if(!title) return;
        const content = prompt('文章内容');
        if(!content) return;
        supabase.from('articles').insert({
            title, content, category: cat, author: currentUser.nickname
        }).then(({error}) => {
            if(error) toast('发布失败');
            else { toast('发布成功'); loadArticlesByCategory(cat); }
        });
    };

    // ---------- 聊天室模块 ----------
    window.joinRoom = function(roomName) {
        if(!currentUser) return toast('请先登录');
        currentRoom = 'oskwk-' + roomName;
        getEl('channelSelector').style.display = 'none';
        getEl('chatPanel').style.display = 'block';
        getEl('chatBox').innerHTML = '';
        loadChatMessages();
        subscribeToRoom();
    };
    window.joinPrivate = function() {
        const name = prompt('房间名称');
        if(!name) return;
        const pwd = prompt('输入密码（默认: oskwk2024）', 'oskwk2024');
        if(pwd !== 'oskwk2024') return toast('密码错误');
        joinRoom('私人-' + name);
    };
    window.leaveRoom = function() {
        if(realtimeChannel) supabase.removeChannel(realtimeChannel);
        currentRoom = null;
        getEl('channelSelector').style.display = 'block';
        getEl('chatPanel').style.display = 'none';
    };
    async function loadChatMessages() {
        if(!currentRoom) return;
        const { data } = await supabase.from('messages').select('*').eq('room', currentRoom).order('created_at');
        getEl('chatBox').innerHTML = '';
        (data||[]).forEach(msg => renderMessage(msg));
    }
    function renderMessage(msg) {
        const box = getEl('chatBox');
        const div = document.createElement('div');
        div.className = `msg ${msg.nickname===currentUser.nickname?'mine':'other'}`;
        let html = `<b>${msg.nickname}</b><br>`;
        if(msg.message) html += msg.message;
        if(msg.image_url) html += `<br><img src="${msg.image_url}" style="max-width:180px; border-radius:12px; margin-top:6px;">`;
        html += `<span class="time">${new Date(msg.created_at).toLocaleTimeString()}</span>`;
        div.innerHTML = html;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
    function subscribeToRoom() {
        if(!currentRoom) return;
        if(realtimeChannel) supabase.removeChannel(realtimeChannel);
        realtimeChannel = supabase
            .channel('room-' + currentRoom)
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'messages',
                filter: `room=eq.${currentRoom}`
            }, (payload) => renderMessage(payload.new))
            .subscribe();
    }
    window.sendMsg = async function() {
        if(!currentUser || !currentRoom) return toast('请先登录并加入房间');
        const text = getEl('msgInput').value.trim();
        if(!text) return;
        const { error } = await supabase.from('messages').insert({
            room: currentRoom, nickname: currentUser.nickname, message: text
        });
        if(error) toast('发送失败');
        getEl('msgInput').value = '';
    };
    window.uploadImg = async function() {
        if(!currentUser || !currentRoom) return toast('请先登录并加入房间');
        const file = getEl('imgUpload').files[0];
        if(!file) return;
        if(file.size > 5*1024*1024) return toast('图片不能超过5MB');
        const path = currentRoom + '/' + Date.now() + '_' + file.name;
        const { error: uploadErr } = await supabase.storage.from('CHAT-INMAGES').upload(path, file);
        if(uploadErr) {
            if(uploadErr.message.includes('bucket') || uploadErr.message.includes('not found'))
                toast('请先在 Supabase 创建名为 CHAT-INMAGES 的公开存储桶');
            else
                toast('上传失败，请检查存储桶权限（需执行SQL策略）');
            return;
        }
        const { data: { publicUrl } } = supabase.storage.from('CHAT-INMAGES').getPublicUrl(path);
        await supabase.from('messages').insert({
            room: currentRoom, nickname: currentUser.nickname, image_url: publicUrl
        });
        getEl('imgUpload').value = '';
    };

    // 启动与自动登录
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('oskwk_user');
        if(saved) {
            try {
                currentUser = JSON.parse(saved);
                enterApp();
            } catch(e) {
                localStorage.removeItem('oskwk_user');
                getEl('loading').style.display = 'none';
            }
        } else {
            setTimeout(() => getEl('loading').style.display = 'none', 800);
        }
    });
})();
</script>
</body>
</html>
