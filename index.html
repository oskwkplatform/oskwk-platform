<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oskwk</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

#loader{position:fixed;inset:0;z-index:99999;background:#0c0c0c;display:flex;flex-direction:column;align-items:center;justify-content:center}
#loader.done{opacity:0;visibility:hidden;pointer-events:none;transition:opacity .6s,visibility .6s}
.ld-logo{font-size:clamp(3rem,7vw,5rem);font-weight:200;color:#fff;letter-spacing:.5em;text-transform:uppercase;animation:breathe 3s ease-in-out infinite}
.ld-sub{margin-top:1.2rem;font-size:.7rem;color:rgba(255,255,255,.25);letter-spacing:1em;text-transform:lowercase}
@keyframes breathe{0%,100%{opacity:.25;transform:scale(.96)}50%{opacity:1;transform:scale(1.02)}}

#authOverlay{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;padding:1rem;background:#0c0c0c}
#authOverlay.show{display:flex}
#authOverlay.hidden{display:none}
.auth-card{width:90%;max-width:420px;padding:2.5rem 2rem;border-radius:24px;background:#1a1a1a;border:1px solid rgba(255,255,255,.08);text-align:center}
.auth-logo{font-size:clamp(2.2rem,6vw,3.5rem);font-weight:200;color:#fff;letter-spacing:.3em;text-transform:uppercase;margin-bottom:.5rem}
.auth-sub{font-size:.75rem;color:rgba(255,255,255,.35);letter-spacing:.5em;text-transform:lowercase;margin-bottom:2.5rem}
.auth-input{width:100%;padding:1rem 1.2rem;border-radius:16px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:1rem;outline:none;margin-bottom:.8rem;font-family:inherit;-webkit-appearance:none}
.auth-input::placeholder{color:rgba(255,255,255,.3)}
.auth-input:focus{border-color:rgba(255,255,255,.3)}
.auth-btn{width:100%;padding:1rem;border-radius:16px;background:#fff;color:#0f3d2e;border:none;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;font-family:inherit}
.auth-btn:active{transform:scale(.98)}
.auth-btn:disabled{background:rgba(255,255,255,.3);color:rgba(0,0,0,.4);cursor:not-allowed}
.auth-hint{margin-top:.8rem;font-size:.8rem;color:rgba(255,255,255,.4);min-height:1.2em}
.auth-hint.err{color:#ff6b6b}
.auth-switch{margin-top:1.2rem;font-size:.85rem;color:rgba(255,255,255,.4)}
.auth-switch a{color:#fff;text-decoration:underline;cursor:pointer}
.status-pill{position:absolute;top:1rem;left:50%;transform:translateX(-50%);padding:.4rem 1rem;border-radius:100px;font-size:.7rem;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.1);white-space:nowrap}
.status-pill.ok{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(74,222,128,.2)}
.status-pill.err{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(248,113,113,.2)}

#app{display:none}
#app.on{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.nav{position:fixed;top:0;left:0;right:0;z-index:90;height:64px;background:rgba(250,249,246,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,0,0,.05)}
.nav-inner{max-width:1400px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 1.2rem}
.nav-brand{font-size:1.2rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase}
.nav-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#0f3d2e,#1a5c47);display:flex;align-items:center;justify-content:center;color:#fff;font-size:.8rem;font-weight:600}

.hero{position:relative;height:60vh;min-height:400px;display:flex;align-items:flex-end;padding-bottom:3rem;padding-top:64px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:linear-gradient(135deg,#0f3d2e 0%,#1a5c47 40%,#0c0c0c 100%)}
.hero-mask{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 0%,rgba(0,0,0,.4) 100%)}
.hero-inner{position:relative;z-index:2;padding:0 1.2rem}
.hero-tag{display:inline-block;padding:.5rem 1rem;border-radius:100px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.9);font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;margin-bottom:1.5rem}
.hero h1{font-size:clamp(2rem,8vw,3.5rem);font-weight:700;color:#fff;line-height:1.1;margin-bottom:1rem}
.hero p{font-size:1rem;color:rgba(255,255,255,.75);line-height:1.7;max-width:400px}

.main{padding:2rem 1.2rem 5rem}
.sec-title{font-size:1.05rem;font-weight:600;margin-bottom:1.5rem;display:flex;align-items:center;gap:.8rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(0,0,0,.05),transparent)}

.page{display:none}
.page.active{display:block;animation:fadeIn .3s ease}

.admin-bar{display:none;align-items:center;gap:1rem;margin-bottom:1.5rem;padding:1rem;background:rgba(15,61,46,.03);border:1px dashed rgba(15,61,46,.15);border-radius:12px}
.admin-bar.vis{display:flex}
.admin-bar button{padding:.5rem 1.2rem;border-radius:12px;background:#0f3d2e;color:#fff;border:none;font-size:.85rem;font-weight:500}

.article-item{background:#fff;border-radius:16px;padding:1.5rem;margin-bottom:1rem;border:1px solid rgba(0,0,0,.05);box-shadow:0 2px 12px rgba(0,0,0,.03);position:relative}
.article-item h3{font-size:1.1rem;font-weight:600;margin-bottom:.5rem;padding-right:4rem}
.article-item .art-content{color:#525252;line-height:1.8;font-size:.95rem;margin:.8rem 0}
.article-item .art-content img{max-width:100%;border-radius:12px;margin:.5rem 0;display:block}
.article-item small{color:#a3a3a3;font-size:.8rem}
.comment-sec{margin-top:1rem;padding-top:1rem;border-top:1px solid rgba(0,0,0,.05)}
.comment-input-row{display:flex;gap:.5rem;margin-top:.8rem}
.comment-input-row input{flex:1;padding:.7rem 1rem;border-radius:12px;background:#f8f7f4;border:1px solid rgba(0,0,0,.08);font-size:.9rem;outline:none;font-family:inherit}
.comment-input-row button{padding:.7rem 1.2rem;border-radius:12px;background:#0f3d2e;color:#fff;border:none;font-size:.85rem}

.channel-grid{display:grid;gap:1rem;grid-template-columns:repeat(2,1fr)}
.channel-card{background:#fff;padding:1.5rem 1rem;border-radius:16px;text-align:center;border:1px solid rgba(0,0,0,.05);font-size:.95rem;font-weight:500}
.chat-box{height:50vh;overflow-y:auto;background:#faf9f6;border-radius:16px;padding:1rem;margin:1rem 0;border:1px solid rgba(0,0,0,.05);-webkit-overflow-scrolling:touch}
.msg{max-width:85%;padding:.8rem 1rem;border-radius:1.2rem;margin-bottom:.8rem;font-size:.95rem;line-height:1.5;word-break:break-word}
.msg.mine{background:#0f3d2e;color:#fff;margin-left:auto;border-bottom-right-radius:.3rem}
.msg.other{background:#fff;border:1px solid rgba(0,0,0,.08);margin-right:auto;border-bottom-left-radius:.3rem}
.msg .time{font-size:.7rem;opacity:.5;display:block;text-align:right;margin-top:.3rem}
.msg img{max-width:150px;border-radius:.8rem;margin-top:.3rem;display:block}
.chat-input{display:flex;gap:.5rem}
.chat-input input{flex:1;padding:.8rem 1.2rem;border-radius:100px;background:#fff;border:1px solid rgba(0,0,0,.1);font-size:.95rem;outline:none;font-family:inherit}
.chat-input button{padding:.8rem 1.4rem;border-radius:100px;background:#0f3d2e;color:#fff;border:none;font-weight:600;font-size:.9rem}

.profile-card{background:#fff;border-radius:16px;padding:1.5rem;border:1px solid rgba(0,0,0,.05)}
.profile-header{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.profile-avatar-lg{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#0f3d2e,#1a5c47);display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.4rem;font-weight:600}
.profile-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0}
.profile-stat{background:#faf9f6;padding:1rem;border-radius:12px;text-align:center}
.profile-stat .num{font-size:1.5rem;font-weight:700;color:#0f3d2e}
.profile-stat .lab{font-size:.75rem;color:#a3a3a3;margin-top:.2rem}
.btn-row{width:100%;padding:.9rem;border-radius:12px;border:none;font-size:.95rem;font-weight:600;font-family:inherit;margin-top:.6rem;cursor:pointer}
.btn-primary{background:#0f3d2e;color:#fff}
.btn-secondary{background:#f8f7f4;color:#525252;border:1px solid rgba(0,0,0,.08)}
.btn-danger{background:rgba(220,38,38,.05);color:#dc2626;border:1px solid rgba(220,38,38,.15)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:20px;padding:2rem;max-width:420px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;font-size:1.5rem;color:#a3a3a3;cursor:pointer;width:36px;height:36px}
.inp{width:100%;padding:.9rem 1.1rem;border-radius:12px;background:#f8f7f4;border:1px solid rgba(0,0,0,.08);font-size:1rem;margin-bottom:.8rem;outline:none;font-family:inherit}

.footer{text-align:center;color:#a3a3a3;font-size:.85rem;padding:2rem 1rem;background:#faf9f6;margin-top:2rem}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:.8rem 1.5rem;border-radius:100px;z-index:9999;display:none;font-size:.9rem;font-weight:500;white-space:nowrap}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;padding:1rem;z-index:300}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:85vh;border-radius:12px}

.mob-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(250,249,246,.95);backdrop-filter:blur(20px);border-top:1px solid rgba(0,0,0,.05);display:flex;justify-content:space-around;padding:.4rem 0;z-index:80}
.mob-nav button{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:.2rem;font-size:.6rem;color:#a3a3a3;padding:.3rem .6rem;font-family:inherit}
.mob-nav button.on{color:#0f3d2e;font-weight:600}
</style>
</head>
<body>

<div id="loader"><div class="ld-logo">Oskwk</div><div class="ld-sub">platform</div></div>

<div id="authOverlay">
  <div class="status-pill" id="statusPill">等待操作...</div>
  <div class="auth-card" id="loginCard">
    <div class="auth-logo">Oskwk</div>
    <div class="auth-sub">platform</div>
    <input type="email" id="loginEmail" class="auth-input" placeholder="邮箱" autocomplete="email">
    <input type="password" id="loginPassword" class="auth-input" placeholder="密码" autocomplete="current-password">
    <button class="auth-btn" id="loginBtn" onclick="doLogin()">登录</button>
    <div class="auth-hint" id="loginHint"></div>
    <div class="auth-switch"><span>还没有账户？</span><a onclick="showRegister()">去注册</a></div>
  </div>
  <div class="auth-card" id="registerCard" style="display:none">
    <div class="auth-logo">Oskwk</div>
    <div class="auth-sub">全人类共同体</div>
    <input id="regPhone" class="auth-input" placeholder="手机号" type="tel">
    <input id="regEmail" class="auth-input" placeholder="邮箱" type="email" autocomplete="email">
    <div style="display:flex;gap:.5rem">
      <input id="regCode" class="auth-input" placeholder="验证码" style="flex:1">
      <button onclick="sendCode()" style="padding:0 1rem;border-radius:12px;background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15);font-size:.85rem;white-space:nowrap">获取</button>
    </div>
    <input id="regPassword" type="password" class="auth-input" placeholder="设置密码（至少6位）">
    <input id="regNickname" class="auth-input" placeholder="昵称">
    <label style="display:flex;align-items:center;gap:.5rem;color:rgba(255,255,255,.5);font-size:.85rem;margin:.5rem 0 1rem">
      <input type="checkbox" id="regAgree"> 同意用户协议
    </label>
    <button class="auth-btn" id="regBtn" onclick="doRegister()">创建账户</button>
    <div class="auth-switch"><span>已有账户？</span><a onclick="showLogin()">去登录</a></div>
  </div>
</div>

<div id="app">
<nav class="nav"><div class="nav-inner">
<div class="nav-brand">Oskwk</div>
<div class="nav-avatar" id="userAvatar" onclick="switchTab('profile')"><span id="avatarText">?</span></div>
</div></nav>

<section class="hero"><div class="hero-bg"></div><div class="hero-mask"></div><div class="hero-inner">
<div class="hero-tag">全人类共同体</div>
<h1>连接全球<br>创作者</h1>
<p>探索、交流、成长。Oskwk 是你的开放社区。</p>
</div></section>

<div class="main">
<div class="page active" id="tab-about">
<div class="admin-bar" id="admin-about"><span>👑 管理员</span><button onclick="openPublish('about')">发布</button></div>
<div class="sec-title">关于 Oskwk</div><div id="article-about"><p style="color:#a3a3a3">加载中...</p></div>
</div>
<div class="page" id="tab-discover">
<div class="admin-bar" id="admin-discover"><span>👑 管理员</span><button onclick="openPublish('discover')">发布</button></div>
<div class="sec-title">最新发现</div><div id="article-discover"><p style="color:#a3a3a3">加载中...</p></div>
</div>
<div class="page" id="tab-study">
<div class="admin-bar" id="admin-study"><span>👑 管理员</span><button onclick="openPublish('study')">发布</button></div>
<div class="sec-title">学术学习</div><div id="article-study"><p style="color:#a3a3a3">加载中...</p></div>
</div>
<div class="page" id="tab-chat">
<div class="sec-title">交流中心</div>
<div id="channelSelector"><div class="channel-grid">
<div class="channel-card" onclick="joinRoom('大厅')">🏠 大厅</div>
<div class="channel-card" onclick="joinRoom('技术')">💻 技术</div>
<div class="channel-card" onclick="joinRoom('理论')">📖 理论</div>
<div class="channel-card" onclick="joinRoom('艺术')">🎨 艺术</div>
</div></div>
<div id="chatPanel" style="display:none">
<button onclick="leaveRoom()" style="margin-bottom:1rem;padding:.5rem 1rem;border-radius:100px;background:#f8f7f4;border:1px solid rgba(0,0,0,.08);font-size:.9rem">← 返回</button>
<div class="chat-box" id="chatBox"></div>
<div class="chat-input"><input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()"><button onclick="document.getElementById('imgUp').click()">📷</button><input type="file" id="imgUp" accept="image/*" style="display:none" onchange="uploadImg()"><button onclick="sendMsg()">发送</button></div>
</div>
</div>
<div class="page" id="tab-profile">
<div class="sec-title">个人中心</div>
<div class="profile-card">
<div class="profile-header">
<div class="profile-avatar-lg" id="profileAvatar" onclick="uploadAvatar()"><span id="profileAvatarText">?</span></div>
<div><h2 id="profileNick" style="font-size:1.2rem">--</h2><p id="profileMail" style="color:#a3a3a3;font-size:.85rem">--</p></div>
</div>
<div class="profile-stats">
<div class="profile-stat"><div class="num" id="joinDays">0</div><div class="lab">天数</div></div>
<div class="profile-stat"><div class="num">VIP</div><div class="lab">等级</div></div>
<div class="profile-stat"><div class="num">∞</div><div class="lab">潜力</div></div>
</div>
<button class="btn-row btn-secondary" onclick="openEdit()">编辑资料</button>
<div id="adminProfile" style="display:none;margin-top:.5rem"><button class="btn-row btn-primary" onclick="showUsers()">👥 用户管理</button></div>
<button class="btn-row btn-danger" onclick="doLogout()">退出登录</button>
</div>
</div>
</div>
<div class="footer">© 2026 Oskwk. All rights reserved.</div>
</div>

<div class="mob-nav" id="mobNav">
<button class="on" onclick="switchTab('about');setMob(0)">🏠<br>关于</button>
<button onclick="switchTab('discover');setMob(1)">🔍<br>发现</button>
<button onclick="switchTab('study');setMob(2)">📚<br>学术</button>
<button onclick="switchTab('chat');setMob(3)">💬<br>交流</button>
<button onclick="switchTab('profile');setMob(4)">👤<br>我的</button>
</div>

<div class="modal-overlay" id="publishModal" onclick="if(event.target===this)closePublish()"><div class="modal-box">
<button class="modal-close" onclick="closePublish()">×</button>
<h3 style="margin-bottom:1rem">发布文章</h3>
<input id="pubTitle" class="inp" placeholder="标题">
<textarea id="pubContent" class="inp" placeholder="内容" rows="4" style="resize:vertical"></textarea>
<input id="pubImgUrl" class="inp" placeholder="图片URL（可选）">
<button class="btn-row btn-primary" onclick="submitArticle()">发布</button>
</div></div>

<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()"><div class="modal-box">
<button class="modal-close" onclick="closeEdit()">×</button>
<h3 style="margin-bottom:1rem">编辑资料</h3>
<input id="editNickname" class="inp" placeholder="新昵称">
<input id="editOldPwd" type="password" class="inp" placeholder="当前密码">
<input id="editNewPwd" type="password" class="inp" placeholder="新密码（不修改留空）">
<button class="btn-row btn-primary" onclick="saveProfile()">保存</button>
</div></div>

<div class="modal-overlay" id="adminModal" onclick="if(event.target===this)closeAdmin()"><div class="modal-box" style="max-width:500px">
<button class="modal-close" onclick="closeAdmin()">×</button>
<h3 style="margin-bottom:1rem">用户管理</h3>
<div id="adminUserList" style="max-height:60vh;overflow-y:auto"></div>
</div></div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src=""></div>
<div class="toast" id="toast"></div>

<script>
// ==================== 全局错误捕获（iPhone 必备）====================
window.onerror=function(msg,url,line){
  console.error('JS Error:',msg,'Line:',line);
  // 如果启动阶段报错，强制显示登录界面
  var auth=document.getElementById('authOverlay');
  var loader=document.getElementById('loader');
  if(auth)auth.style.display='flex';
  if(loader)loader.style.display='none';
  return true;
};
window.onunhandledrejection=function(e){
  console.error('Unhandled Promise:',e.reason);
};

// ==================== Config ====================
var SUPABASE_URL='https://ouejetzclopuuafmnbjq.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZWpldHpjbG9wdXVhZm1uYmpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3MzM1NjksImV4cCI6MjA5MzMwOTU2OX0.fGuExq4_43l4N1YF9339c934pJmTQAcNX_oOSuF-Bzw';
var ADMIN_EMAIL='279933264@qq.com';

var supabase=null;
var currentUser=null;
var currentRoom=null;
var realtimeChannel=null;
var pubCategory=null;

// ==================== Safe Storage ====================
function safeGet(k){
  try{return localStorage.getItem(k)}catch(e){return null}
}
function safeSet(k,v){
  try{localStorage.setItem(k,v)}catch(e){}
}
function safeRemove(k){
  try{localStorage.removeItem(k)}catch(e){}
}

// ==================== UI ====================
function showLogin(){
  document.getElementById('loginCard').style.display='block';
  document.getElementById('registerCard').style.display='none';
  document.getElementById('loginHint').textContent='';
  document.getElementById('loginHint').className='auth-hint';
}
function showRegister(){
  document.getElementById('loginCard').style.display='none';
  document.getElementById('registerCard').style.display='block';
}
function hint(msg,isErr){
  var h=document.getElementById('loginHint');
  h.textContent=msg;
  h.className='auth-hint'+(isErr?' err':'');
}
function setStatus(text,type){
  var p=document.getElementById('statusPill');
  p.textContent=text;
  p.className='status-pill'+(type?' '+type:'');
}
function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.style.display='block';
  setTimeout(function(){t.style.display='none'},2500);
}

// ==================== Supabase Init ====================
function initSupabase(){
  if(typeof window.supabase!=='undefined'&&window.supabase.createClient){
    try{
      supabase=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
      return true;
    }catch(e){
      console.error('Supabase init error:',e);
      return false;
    }
  }
  console.error('Supabase SDK not found');
  return false;
}

// ==================== Boot ====================
setTimeout(function(){
  var loader=document.getElementById('loader');
  var auth=document.getElementById('authOverlay');
  if(loader){
    loader.classList.add('done');
    setTimeout(function(){loader.style.display='none'},600);
  }
  if(auth){
    auth.classList.add('show');
    showLogin();
  }
},1200);

// ==================== Auth ====================
window.doLogin=function(){
  var email=document.getElementById('loginEmail').value.trim();
  var pwd=document.getElementById('loginPassword').value.trim();
  
  if(!email||!pwd){
    hint('请输入邮箱和密码',true);
    return;
  }
  
  if(!supabase&&!initSupabase()){
    hint('服务加载中，请稍后重试',true);
    return;
  }
  
  var btn=document.getElementById('loginBtn');
  btn.disabled=true;
  btn.textContent='登录中...';
  setStatus('正在登录...');
  
  supabase.from('profiles').select('*').eq('email',email).single().then(function(res){
    btn.disabled=false;
    btn.textContent='登录';
    
    if(res.error||!res.data){
      hint('邮箱或密码错误',true);
      setStatus('登录失败','err');
      return;
    }
    
    if(res.data.password_hash!==pwd){
      hint('密码错误',true);
      setStatus('密码错误','err');
      return;
    }
    
    if(res.data.is_banned){
      hint('账号已被限制',true);
      setStatus('账号受限','err');
      return;
    }
    
    currentUser=res.data;
    safeSet('oskwk_user',JSON.stringify(currentUser));
    setStatus('登录成功','ok');
    enterApp();
  }).catch(function(err){
    console.error('Login error:',err);
    btn.disabled=false;
    btn.textContent='登录';
    hint('网络超时，请重试',true);
    setStatus('连接超时','err');
  });
};

window.sendCode=function(){
  toast('验证码：123456');
};

window.doRegister=function(){
  if(!supabase&&!initSupabase()){
    hint('服务加载中',true);
    return;
  }
  
  var phone=document.getElementById('regPhone').value.trim();
  var email=document.getElementById('regEmail').value.trim();
  var code=document.getElementById('regCode').value.trim();
  var pwd=document.getElementById('regPassword').value.trim();
  var nick=document.getElementById('regNickname').value.trim();
  
  if(!phone||!email||!pwd||!nick){
    hint('请填写所有必填项',true);
    return;
  }
  if(code!=='123456'){
    hint('验证码错误（123456）',true);
    return;
  }
  if(pwd.length<6){
    hint('密码至少6位',true);
    return;
  }
  if(!document.getElementById('regAgree').checked){
    hint('请同意协议',true);
    return;
  }
  
  var btn=document.getElementById('regBtn');
  btn.disabled=true;
  btn.textContent='创建中...';
  
  var obj={
    email:email,
    nickname:nick,
    phone:phone,
    password_hash:pwd,
    created_at:new Date().toISOString(),
    location:'Earth',
    is_banned:false
  };
  
  supabase.from('profiles').upsert(obj,{onConflict:'email'}).then(function(res){
    btn.disabled=false;
    btn.textContent='创建账户';
    
    if(res.error){
      hint('注册失败: '+(res.error.message||'未知错误'),true);
      return;
    }
    
    currentUser=obj;
    safeSet('oskwk_user',JSON.stringify(currentUser));
    enterApp();
  }).catch(function(err){
    console.error('Register error:',err);
    btn.disabled=false;
    btn.textContent='创建账户';
    hint('注册超时，请重试',true);
  });
};

// ==================== App ====================
function enterApp(){
  var auth=document.getElementById('authOverlay');
  var app=document.getElementById('app');
  
  if(auth)auth.classList.add('hidden');
  if(app){
    app.style.display='block';
    setTimeout(function(){app.classList.add('on')},50);
  }
  
  updateProfile();
  loadArticles('about');
  loadArticles('discover');
  loadArticles('study');
  
  if(currentUser&&currentUser.email===ADMIN_EMAIL){
    var bars=document.querySelectorAll('.admin-bar');
    for(var i=0;i<bars.length;i++)bars[i].classList.add('vis');
    var ap=document.getElementById('adminProfile');
    if(ap)ap.style.display='block';
  }
}

function updateProfile(){
  if(!currentUser)return;
  
  var nickEl=document.getElementById('profileNick');
  var mailEl=document.getElementById('profileMail');
  var daysEl=document.getElementById('joinDays');
  
  if(nickEl)nickEl.textContent=currentUser.nickname||'--';
  if(mailEl)mailEl.textContent=currentUser.email||'--';
  if(daysEl){
    var days=Math.max(1,Math.floor((Date.now()-new Date(currentUser.created_at).getTime())/86400000));
    daysEl.textContent=days;
  }
  
  var initial=(currentUser.nickname?currentUser.nickname.charAt(0).toUpperCase():'?');
  var avaHtml=currentUser.avatar_url?'<img src="'+escapeHtml(currentUser.avatar_url)+'">':'<span>'+initial+'</span>';
  
  var userAvatar=document.getElementById('userAvatar');
  var profileAvatar=document.getElementById('profileAvatar');
  
  if(userAvatar)userAvatar.innerHTML=avaHtml;
  if(profileAvatar)profileAvatar.innerHTML=avaHtml;
}

// 防止 XSS
function escapeHtml(text){
  if(!text)return '';
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

window.doLogout=function(){
  safeRemove('oskwk_user');
  location.reload();
};

// ==================== Tabs ====================
window.switchTab=function(cat){
  var pages=document.querySelectorAll('.page');
  for(var i=0;i<pages.length;i++)pages[i].classList.remove('active');
  
  var el=document.getElementById('tab-'+cat);
  if(el)el.classList.add('active');
  
  if(cat!=='chat'&&currentRoom)leaveRoom();
  window.scrollTo({top:0,behavior:'smooth'});
};

window.setMob=function(idx){
  var btns=document.querySelectorAll('.mob-nav button');
  for(var i=0;i<btns.length;i++)btns[i].classList.toggle('on',i===idx);
};

// ==================== Articles ====================
function loadArticles(cat){
  var container=document.getElementById('article-'+cat);
  if(!container)return;
  
  if(!supabase){
    container.innerHTML='<p style="color:#a3a3a3;padding:2rem 0">服务未连接</p>';
    return;
  }
  
  supabase.from('articles').select('*').eq('category',cat).order('created_at',{ascending:false}).then(function(res){
    if(res.error||!res.data||!res.data.length){
      container.innerHTML='<p style="color:#a3a3a3;padding:2rem 0">'+(res.error?'加载失败':'暂无文章')+'</p>';
      return;
    }
    
    var html='';
    for(var i=0;i<res.data.length;i++){
      var a=res.data[i];
      var content=(a.content||'').replace(/\n/g,'<br>');
      var imgHtml=a.image_url?'<br><img src="'+escapeHtml(a.image_url)+'" onclick="openLightbox(\''+escapeHtml(a.image_url)+'\')">':'';
      var delBtn=(currentUser&&currentUser.email===ADMIN_EMAIL)?'<button onclick="deleteArticle('+a.id+',\''+cat+'\')" style="position:absolute;top:1rem;right:1rem;background:rgba(220,38,38,.06);color:#dc2626;border:1px solid rgba(220,38,38,.15);border-radius:8px;padding:.3rem .8rem;font-size:.75rem">删除</button>':'';
      
      html+='<div class="article-item"><h3>'+escapeHtml(a.title)+'</h3>'+delBtn+
      '<div class="art-content">'+content+imgHtml+'</div>'+
      '<small>'+escapeHtml(a.author||'匿名')+' · '+new Date(a.created_at).toLocaleString()+'</small>'+
      '<div class="comment-sec"><strong style="display:block;margin-bottom:.5rem;font-size:.9rem">留言</strong><div id="commentList-'+a.id+'"></div>'+
      '<div class="comment-input-row"><input id="commentInput-'+a.id+'" placeholder="写下想法..."><button onclick="postComment('+a.id+')">发送</button></div></div></div>';
    }
    
    container.innerHTML=html;
    
    for(var j=0;j<res.data.length;j++){
      loadComments(res.data[j].id);
    }
  }).catch(function(err){
    console.error('Load articles error:',err);
    container.innerHTML='<p style="color:#a3a3a3;padding:2rem 0">加载超时</p>';
  });
}

function loadComments(id){
  if(!supabase)return;
  
  supabase.from('comments').select('*').eq('article_id',id).order('created_at').then(function(res){
    var box=document.getElementById('commentList-'+id);
    if(!box)return;
    
    var html='';
    var data=res.data||[];
    for(var i=0;i<data.length;i++){
      var c=data[i];
      html+='<p style="font-size:.9rem;color:#525252;margin-bottom:.4rem"><b>'+escapeHtml(c.nickname)+'</b>: '+escapeHtml(c.content)+' <small style="color:#a3a3a3">'+new Date(c.created_at).toLocaleTimeString()+'</small></p>';
    }
    box.innerHTML=html;
  }).catch(function(err){
    console.error('Load comments error:',err);
  });
}

window.postComment=function(id){
  if(!currentUser){
    toast('请先登录');
    return;
  }
  if(!supabase)return;
  
  var input=document.getElementById('commentInput-'+id);
  if(!input||!input.value.trim())return;
  
  supabase.from('comments').insert({
    article_id:id,
    nickname:currentUser.nickname,
    content:input.value.trim()
  }).then(function(res){
    if(res.error){
      toast('发送失败');
      return;
    }
    input.value='';
    loadComments(id);
  }).catch(function(){
    toast('发送失败');
  });
};

window.openPublish=function(cat){
  if(!currentUser||currentUser.email!==ADMIN_EMAIL){
    toast('无权操作');
    return;
  }
  pubCategory=cat;
  document.getElementById('publishModal').classList.add('show');
};

window.closePublish=function(){
  document.getElementById('publishModal').classList.remove('show');
};

window.submitArticle=function(){
  if(!supabase){
    toast('服务未就绪');
    return;
  }
  
  var title=document.getElementById('pubTitle').value.trim();
  var content=document.getElementById('pubContent').value.trim();
  var img=document.getElementById('pubImgUrl').value.trim();
  
  if(!title||!content){
    toast('请填写标题和内容');
    return;
  }
  
  supabase.from('articles').insert({

  }).then(function(res){

window.deleteArticle=function(id,cat){

// ==================== Chat ====================
window.joinRoom=function(roomName){
  if(!currentUser){
    toast('请先登录');
    return;
  }
  if(!supabase&&!initSupabase()){
    toast('服务未就绪');
    return;
  }
  
  currentRoom='oskwk-'+roomName;
  document.getElementById('channelSelector').style.display='none';
  document.getElementById('chatPanel').style.display='block';
  document.getElementById('chatBox').innerHTML='';
  
  loadChat();
  subscribeRoom();
};

window.leaveRoom=function(){
  if(realtimeChannel){
    try{
      supabase.removeChannel(realtimeChannel);
    }catch(e){
      console.error(e);
    }
    realtimeChannel=null;
  }
  currentRoom=null;
  document.getElementById('channelSelector').style.display='block';
  document.getElementById('chatPanel').style.display='none';
};

function loadChat(){
  if(!supabase||!currentRoom)return;
  
  supabase.from('messages').select('*').eq('room',currentRoom).order('created_at').then(function(res){
    var cb=document.getElementById('chatBox');
    if(!cb)return;
    cb.innerHTML='';
    
    var data=res.data||[];
    for(var i=0;i<data.length;i++){
      renderMsg(data[i]);
    }
  }).catch(function(err){
    console.error('Load chat error:',err);
  });
}

function renderMsg(msg){
  var cb=document.getElementById('chatBox');
  if(!cb)return;
  
  var div=document.createElement('div');
  var isMine=msg.nickname===(currentUser?currentUser.nickname:'');
  div.className='msg '+(isMine?'mine':'other');
  
  var imgHtml='';
  if(msg.image_url){
    imgHtml='<br><img src="'+escapeHtml(msg.image_url)+'" style="max-width:150px;border-radius:.6rem" onclick="openLightbox(\''+escapeHtml(msg.image_url)+'\')">';
  }
  
  div.innerHTML='<b>'+escapeHtml(msg.nickname)+'</b><br>'+escapeHtml(msg.message||'')+imgHtml+'<span class="time">'+new Date(msg.created_at).toLocaleTimeString()+'</span>';
  cb.appendChild(div);
  cb.scrollTop=cb.scrollHeight;
}

function subscribeRoom(){
  if(!supabase||!currentRoom)return;
  
  if(realtimeChannel){
    try{
      supabase.removeChannel(realtimeChannel);
    }catch(e){
      console.error(e);
    }
  }
  
  realtimeChannel=supabase.channel('room-'+currentRoom).on('postgres_changes',{
    event:'INSERT',
    schema:'public',
    table:'messages',
    filter:'room=eq.'+currentRoom
  },function(payload){
    renderMsg(payload.new);
  }).subscribe();
}

window.sendMsg=function(){
  if(!currentUser){
    toast('请先登录');
    return;
  }
  if(!supabase||!currentRoom){
    toast('服务未就绪');
    return;
  }
  
  var text=document.getElementById('msgInput').value.trim();
  if(!text)return;
  
  supabase.from('messages').insert({
    room:currentRoom,
    nickname:currentUser.nickname,
    message:text
  }).then(function(){
    document.getElementById('msgInput').value='';
  }).catch(function(){
    toast('发送失败');
  });
};

window.uploadImg=function(){
  if(!currentUser||!currentRoom){
    toast('请先登录并加入房间');
    return;
  }
  if(!supabase){
    toast('服务未就绪');
    return;
  }
  
  var fileInput=document.getElementById('imgUp');
  var file=fileInput.files[0];
  if(!file)return;
  
  if(file.size>5*1024*1024){
    toast('图片不能超过5MB');
    fileInput.value='';
    return;
  }
  
  var ext=(file.name.split('.').pop()||'').toLowerCase();
  var fn=Date.now()+'_'+Math.random().toString(36).slice(2,8)+'.'+ext;
  var path='uploads/'+fn;
  
  supabase.storage.from('CHAT-INMAGES').upload(path,file,{
    cacheControl:'3600',
    upsert:false
  }).then(function(res){
    if(res.error){
      toast('上传失败');
      fileInput.value='';
      return;
    }
    
    var urlData=supabase.storage.from('CHAT-INMAGES').getPublicUrl(path);
    var url=urlData.data?urlData.data.publicUrl:null;
    
    if(!url){
      toast('获取链接失败');
      fileInput.value='';
      return;
    }
    
    supabase.from('messages').insert({
      room:currentRoom,
      nickname:currentUser.nickname,
      image_url:url
    }).then(function(){
      toast('图片已发送');
    });
    
    fileInput.value='';
  }).catch(function(err){
    console.error('Upload error:',err);
    toast('上传异常');
    fileInput.value='';
  });
};

// ==================== Admin ====================
window.showUsers=function(){
  if(!currentUser||currentUser.email!==ADMIN_EMAIL){
    toast('无权操作');
    return;
  }
  if(!supabase){
    toast('服务未就绪');
    return;
  }
  
  supabase.from('profiles').select('*').order('created_at',{ascending:false}).then(function(res){
    if(!res.data||!res.data.length){
      toast('暂无用户');
      return;
    }
    
    var list=document.getElementById('adminUserList');
    var html='';
    
    for(var i=0;i<res.data.length;i++){
      var u=res.data[i];
      var tag=u.is_banned?'<span style="color:#dc2626;font-size:.75rem">[已拉黑]</span>':'';
      html+='<div onclick="toggleBan(\''+u.email+'\','+(!u.is_banned)+')" style="padding:.8rem;border:1px solid rgba(0,0,0,.08);border-radius:12px;margin-bottom:.5rem;cursor:pointer">'+
      '<div style="display:flex;justify-content:space-between"><b>'+escapeHtml(u.nickname)+'</b>'+tag+'</div>'+

  });

window.toggleBan=function(email,ban){
  if(!supabase)return;
  
  supabase.from('profiles').update({is_banned:ban}).eq('email',email).then(function(){
    toast(ban?'已拉黑':'已解除');
    showUsers();
  }).catch(function(){
    toast('操作失败');
  });
};

window.closeAdmin=function(){
  document.getElementById('adminModal').classList.remove('show');
};

// ==================== Profile ====================
window.openEdit=function(){
  if(!currentUser){
    toast('请先登录');
    return;
  }
  document.getElementById('editNickname').value=currentUser.nickname||'';
  document.getElementById('editModal').classList.add('show');
};

window.closeEdit=function(){
  document.getElementById('editModal').classList.remove('show');
};

window.saveProfile=function(){
  if(!currentUser||!supabase){
    toast('服务未就绪');
    return;
  }
  
  var nick=document.getElementById('editNickname').value.trim();
  var oldPwd=document.getElementById('editOldPwd').value.trim();
  var newPwd=document.getElementById('editNewPwd').value.trim();
  
  var updates={};
  
  if(nick&&nick!==currentUser.nickname){
    updates.nickname=nick;
    currentUser.nickname=nick;
  }
  
  if(newPwd){
    if(!oldPwd){
      toast('请输入当前密码');
      return;
    }
    if(oldPwd!==currentUser.password_hash){
      toast('当前密码错误');
      return;
    }
    if(newPwd.length<6){
      toast('新密码至少6位');
      return;
    }
    updates.password_hash=newPwd;
    currentUser.password_hash=newPwd;
  }
  
  if(Object.keys(updates).length===0){
    closeEdit();
    return;
  }
  
  supabase.from('profiles').update(updates).eq('email',currentUser.email).then(function(){
    safeSet('oskwk_user',JSON.stringify(currentUser));
    updateProfile();
    closeEdit();
    toast('已更新');
  }).catch(function(){
    toast('保存失败');
  });
};

window.uploadAvatar=function(){
  if(!currentUser){
    toast('请先登录');
    return;
  }
  if(!supabase){
    toast('服务未就绪');
    return;
  }
  
  var input=document.createElement('input');
  input.type='file';
  input.accept='image/*';
  
  input.onchange=function(){
    var file=input.files[0];
    if(!file)return;
    
    if(file.size>2*1024*1024){
      toast('头像不能超过2MB');
      return;
    }
    
    var ext=(file.name.split('.').pop()||'').toLowerCase();
    var fn='avatars/'+currentUser.email.replace(/[^a-zA-Z0-9]/g,'_')+'_'+Date.now()+'.'+ext;
    
    supabase.storage.from('CHAT-INMAGES').upload(fn,file,{
      cacheControl:'3600',
      upsert:true
    }).then(function(res){
      if(res.error){
        toast('上传失败');
        return;
      }
      
      var urlData=supabase.storage.from('CHAT-INMAGES').getPublicUrl(fn);
      var url=urlData.data?urlData.data.publicUrl:null;
      
      if(!url){
        toast('获取链接失败');
        return;
      }
      
      supabase.from('profiles').update({avatar_url:url}).eq('email',currentUser.email).then(function(){
        currentUser.avatar_url=url;
        safeSet('oskwk_user',JSON.stringify(currentUser));
        updateProfile();
        toast('头像已更新');
      });
    }).catch(function(){
      toast('上传异常');
    });
  };
  
  input.click();
};

  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
};

window.closeLightbox=function(){
  document.getElementById('lightbox').classList.remove('show');
};
