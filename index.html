<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oskwk · 全人类共同体</title>
    <style>
        :root { --glass-bg: rgba(20,20,30,0.45); --glass-border: rgba(255,255,255,0.1); --accent: #6d8aff; --radius-2xl: 32px; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter','PingFang SC',sans-serif; background:#0b0b12; color:#f0f0f5; min-height:100vh; }
        body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 50%, rgba(99,102,241,0.15) 0%, transparent 50%), radial-gradient(ellipse at 80% 20%, rgba(236,72,153,0.1) 0%, transparent 50%); z-index:0; }
        .loading-screen { position:fixed; inset:0; background:#000; display:flex; align-items:center; justify-content:center; z-index:9999; color:#fff; font-size:3rem; font-weight:700; letter-spacing:0.3em; }
        .hero { height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; position:relative; z-index:1; }
        .hero h1 { font-size:clamp(3rem,8vw,5rem); background:linear-gradient(135deg,#fff,#c4b5fd); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:2rem; }
        .hero button { background:rgba(255,255,255,0.12); backdrop-filter:blur(20px); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:1rem 3rem; border-radius:3rem; font-size:1.1rem; cursor:pointer; }
        .toast { position:fixed; top:30px; left:50%; transform:translateX(-50%); background:rgba(20,20,30,0.9); padding:0.8rem 2rem; border-radius:3rem; z-index:999; display:none; }
        .main-layout { display:none; padding:90px 20px 40px; max-width:1300px; margin:0 auto; position:relative; z-index:1; }
        .main-layout.active { display:block; }
        .nav-glass { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(15,15,25,0.5); backdrop-filter:blur(30px); display:flex; gap:0.5rem; padding:0.8rem 2rem; overflow-x:auto; }
        .nav-glass span { font-weight:700; font-size:1.3rem; color:#fff; margin-right:1.5rem; }
        .nav-glass button { background:transparent; border:none; color:#aaa; padding:0.6rem 1.5rem; border-radius:2rem; cursor:pointer; }
        .nav-glass button.active { background:rgba(255,255,255,0.1); color:#fff; }
        .page { display:none; } .page.active { display:block; }
        .pg-hero { height:260px; border-radius:var(--radius-2xl); margin-bottom:2rem; display:flex; align-items:center; justify-content:center; background-size:cover; color:#fff; font-size:2.5rem; font-weight:700; position:relative; overflow:hidden; }
        .pg-hero::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(3px); }
        .pg-hero span { position:relative; z-index:1; }
        .card { background:var(--glass-bg); backdrop-filter:blur(40px); border-radius:var(--radius-2xl); padding:2rem; margin-bottom:2rem; border:1px solid var(--glass-border); }
        .article-item { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); border-radius:24px; padding:2rem; margin-bottom:1.5rem; }
        .comment-section input { padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; width:70%; }
        .comment-section button { padding:0.8rem 1.4rem; border-radius:1rem; background:var(--accent); color:#fff; border:none; cursor:pointer; }
        .channel-grid { display:grid; gap:1rem; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); }
        .channel-card { background:rgba(255,255,255,0.04); backdrop-filter:blur(20px); padding:2rem 1rem; border-radius:24px; cursor:pointer; text-align:center; }
        .chat-box { height:60vh; overflow-y:auto; background:rgba(0,0,0,0.2); border-radius:24px; padding:1.5rem; margin:1rem 0; }
        .msg { max-width:75%; padding:1rem 1.4rem; border-radius:1.5rem; margin-bottom:1rem; }
        .msg.mine { background:linear-gradient(135deg,#6d8aff,#a78bfa); color:#fff; margin-left:auto; }
        .msg.other { background:rgba(255,255,255,0.1); }
        .input-row { display:flex; gap:0.8rem; }
        .input-row input { flex:1; padding:1rem; border-radius:2rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; }
        .input-row button { padding:1rem 2rem; border-radius:2rem; background:var(--accent); color:#fff; border:none; cursor:pointer; }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(15px); z-index:200; display:none; align-items:center; justify-content:center; }
        .modal-overlay.show { display:flex; }
        .modal-box { background:rgba(20,20,30,0.8); backdrop-filter:blur(40px); border-radius:32px; padding:3rem; max-width:460px; width:90%; border:1px solid rgba(255,255,255,0.1); position:relative; }
        .close-modal { position:absolute; top:1rem; right:1.5rem; background:none; border:none; color:#fff; font-size:2rem; cursor:pointer; }
    </style>
</head>
<body>
<canvas id="particles"></canvas>
<div class="loading-screen" id="loading">oskwk</div>

<section class="hero" id="hero">
    <h1>专注于每一个细节<br>呈现极致视觉体验</h1>
    <button onclick="openRegister()">加入我们 →</button>
</section>
<div class="toast" id="toast"></div>

<!-- 注册弹窗 -->
<div class="modal-overlay" id="registerModal" onclick="if(event.target===this)closeRegister()">
    <div class="modal-box">
        <button class="close-modal" onclick="closeRegister()">&times;</button>
        <h2 style="text-align:center; color:#fff; margin-bottom:0.5rem;">创建 Oskwk 账户</h2>
        <p style="color:#aaa; text-align:center; margin-bottom:1.5rem;">全人类共同体 · 测试版 v1.0</p>
        <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
            <select id="regCountry" onchange="toggleForeigner()" style="background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; padding:0.8rem; border-radius:1rem; width:30%;">
                <option value="CN" style="color:#000;">🇨🇳 +86</option>
                <option value="OTHER" style="color:#000;">🌍 其他</option>
            </select>
            <input id="regPhone" placeholder="手机号" style="flex:1; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff;">
        </div>
        <div id="idCardField"><input id="regIdcard" placeholder="身份证号码（选填）" style="width:100%; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; margin-bottom:1rem;"></div>
        <input id="regEmail" placeholder="电子邮箱" style="width:100%; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; margin-bottom:1rem;">
        <div style="display:flex; gap:0.5rem; margin-bottom:1rem;">
            <input id="regCode" placeholder="验证码" style="flex:1; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff;">
            <button onclick="sendVerifyCode()" style="padding:0.8rem 1.2rem; border-radius:1rem; background:var(--accent); color:#fff; border:none; cursor:pointer;">获取</button>
        </div>
        <input id="regPassword" type="password" placeholder="设置密码" style="width:100%; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; margin-bottom:1rem;">
        <input id="regNickname" placeholder="昵称" style="width:100%; padding:0.8rem; border-radius:1rem; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); color:#fff; margin-bottom:1rem;">
        <label style="display:flex; gap:0.5rem; color:#aaa; font-size:0.8rem; margin-bottom:1.5rem;"><input type="checkbox" id="regAgree"> 同意《用户协议》</label>
        <button onclick="doRegister()" style="width:100%; padding:1rem; background:var(--accent); color:#fff; border:none; border-radius:1rem; font-size:1rem; cursor:pointer;">确认创建账户</button>
    </div>
</div>

<!-- 主界面 -->
<div class="main-layout" id="mainLayout">
    <nav class="nav-glass">
        <span>oskwk</span>
        <button class="active" onclick="switchTab('about')">关于oskwk</button>
        <button onclick="switchTab('discover')">最新发现</button>
        <button onclick="switchTab('study')">学术学习</button>
        <button onclick="switchTab('chat')">交流中心</button>
        <button onclick="switchTab('profile')">个人中心</button>
    </nav>

    <div class="page active" id="tab-about">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1200&q=80')"><span>关于oskwk</span></div>
        <div class="card">
            <button class="write-btn" style="display:none; padding:0.6rem 2rem; border-radius:2rem; background:var(--accent); color:#fff; border:none; margin-bottom:1rem;" onclick="publishArticle('about')">✍️ 发布文章</button>
            <div id="article-about"></div>
        </div>
    </div>
    <div class="page" id="tab-discover">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80')"><span>最新发现</span></div>
        <div class="card">
            <button class="write-btn" style="display:none;" onclick="publishArticle('discover')">✍️ 发布文章</button>
            <div id="article-discover"></div>
        </div>
    </div>
    <div class="page" id="tab-study">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=1200&q=80')"><span>学术学习</span></div>
        <div class="card">
            <button class="write-btn" style="display:none;" onclick="publishArticle('study')">✍️ 发布文章</button>
            <div id="article-study"></div>
        </div>
    </div>
    <div class="page" id="tab-chat">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1521737711867-e3b97375f902?w=1200&q=80')"><span>交流中心</span></div>
        <div class="card">
            <div id="channelSelector">
                <div class="channel-grid" id="channelGrid">
                    <div class="channel-card" onclick="joinRoom('大厅')">🏠 大厅</div>
                    <div class="channel-card" onclick="joinRoom('技术')">💻 技术</div>
                    <div class="channel-card" onclick="joinRoom('理论')">📖 理论</div>
                    <div class="channel-card" onclick="joinRoom('艺术')">🎨 艺术</div>
                    <div class="channel-card" onclick="promptCreateRoom()">➕ 创建房间</div>
                </div>
            </div>
            <div id="chatPanel" style="display:none;">
                <button onclick="leaveRoom()" style="margin-bottom:1rem; padding:0.5rem 1.5rem; border-radius:2rem; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.1); color:#fff;">← 返回</button>
                <div class="chat-box" id="chatBox"></div>
                <div class="input-row">
                    <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
                    <button onclick="document.getElementById('imgUpload').click()">📷</button>
                    <input type="file" id="imgUpload" accept="image/*" style="display:none" onchange="uploadImg()">
                    <button onclick="sendMsg()">发送</button>
                </div>
            </div>
        </div>
    </div>
    <div class="page" id="tab-profile">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=1200&q=80')"><span>个人中心</span></div>
        <div class="card">
            <h2 id="profileNick" style="color:#fff;">昵称</h2>
            <p id="profileMail" style="color:#aaa;">邮箱</p>
            <div style="display:grid; grid-template-columns: repeat(3,1fr); gap:1rem; margin:2rem 0;">
                <div><div style="font-size:1.8rem; color:var(--accent);" id="joinDays">0</div>加入天数</div>
                <div><div style="font-size:1.8rem; color:var(--accent);">VIP</div>等级</div>
                <div><div style="font-size:1.8rem; color:var(--accent);">∞</div>潜力</div>
            </div>
            <button id="adminUserBtn" style="display:none; margin-bottom:1rem; padding:0.8rem 2rem; background:var(--accent); color:#fff; border:none; border-radius:2rem;" onclick="showAllUsers()">👥 用户管理</button>
            <button onclick="doLogout()" style="width:100%; padding:1rem; background:rgba(239,68,68,0.2); color:#f87171; border:1px solid rgba(239,68,68,0.3); border-radius:2rem;">退出登录</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const SUPABASE_URL = 'https://ouejetzclopuuafmnbjq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_y72GfgNeGAGShil7rmurrQ_U3w_QeJL';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ADMIN_EMAIL = '279933264@qq.com';
    let currentUser = null, currentRoom = null, realtimeChannel = null;

    function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000); }
    function getEl(id) { return document.getElementById(id); }

    // 注册表单
    window.toggleForeigner = () => getEl('idCardField').style.display = getEl('regCountry').value === 'OTHER' ? 'none' : 'block';
    window.sendVerifyCode = () => toast('验证码已发送（固定123456）');
    window.openRegister = () => getEl('registerModal').classList.add('show');
    window.closeRegister = () => getEl('registerModal').classList.remove('show');
    window.doRegister = async function() {
        const phone = getEl('regPhone').value.trim();
        const email = getEl('regEmail').value.trim();
        const code = getEl('regCode').value.trim();
        const password = getEl('regPassword').value.trim();
        const nickname = getEl('regNickname').value.trim();
        if(!phone || !email || !password || !nickname) return toast('请填写所有必填项');
        if(code !== '123456') return toast('验证码错误（测试用123456）');
        if(password.length < 6) return toast('密码至少6位');
        if(!getEl('regAgree').checked) return toast('请同意协议');
        const country = getEl('regCountry').value;
        const idcard = country === 'OTHER' ? '' : getEl('regIdcard').value.trim();
        currentUser = {
            phone: (country === 'CN' ? '+86 ' : '') + phone,
            email, nickname, id_card: idcard, country,
            password_hash: password, created_at: new Date().toISOString()
        };
        const { error } = await supabase.from('profiles').upsert({
            email: currentUser.email, nickname, phone: currentUser.phone,
            id_card: currentUser.id_card, country: currentUser.country,
            created_at: currentUser.created_at
        }, { onConflict: 'email' });
        if(error) toast('注册失败: '+error.message);
        else {
            localStorage.setItem('oskwk_user', JSON.stringify(currentUser));
            getEl('registerModal').classList.remove('show');
            toast('注册成功！');
            enterApp();
        }
    };

    function enterApp() {
        getEl('loading').style.display = 'none';
        getEl('mainLayout').classList.add('active');
        getEl('hero').style.display = 'none';
        updateProfile();
        loadArticles('about'); loadArticles('discover'); loadArticles('study');
        document.querySelectorAll('.write-btn').forEach(b => b.style.display = 'inline-block');
        if(currentUser.email === ADMIN_EMAIL) getEl('adminUserBtn').style.display = 'inline-block';
        loadCustomRooms();
    }

    function updateProfile() {
        getEl('profileNick').textContent = currentUser.nickname;
        getEl('profileMail').textContent = currentUser.email;
        getEl('joinDays').textContent = Math.max(1, Math.floor((Date.now() - new Date(currentUser.created_at).getTime())/86400000));
    }

    window.doLogout = () => { localStorage.removeItem('oskwk_user'); location.reload(); };
    window.switchTab = function(cat) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const page = document.getElementById('tab-' + cat);
        if(page) page.classList.add('active');
        document.querySelectorAll('.nav-glass button').forEach(b => b.classList.remove('active'));
        const btns = document.querySelectorAll('.nav-glass button');
        const map = { about:0, discover:1, study:2, chat:3, profile:4 };
        if(map[cat] !== undefined) btns[map[cat]].classList.add('active');
        if(cat !== 'chat' && currentRoom) leaveRoom();
    };

    async function loadArticles(cat) {
        const container = getEl('article-' + cat);
        const { data, error } = await supabase.from('articles').select('*').eq('category', cat).order('created_at', {ascending:false});
        if(error) { container.innerHTML = '<p>加载失败</p>'; return; }
        if(!data?.length) { container.innerHTML = '<p style="color:#aaa;">暂无文章</p>'; return; }
        container.innerHTML = data.map(a => `
            <div class="article-item">
                <h3>${a.title}</h3><p style="color:#ccc; margin:0.8rem 0;">${a.content}</p>
                <small style="color:#888;">${a.author} · ${new Date(a.created_at).toLocaleString()}</small>
                <div class="comment-section" id="comment-${a.id}">
                    <strong>留言</strong>
                    <div id="commentList-${a.id}"></div>
                    <input id="commentInput-${a.id}" placeholder="写下想法...">
                    <button onclick="postComment(${a.id})">发送</button>
                </div>
            </div>
        `).join('');
        data.forEach(a => loadComments(a.id));
    }

    async function loadComments(articleId) {
        const { data } = await supabase.from('comments').select('*').eq('article_id', articleId).order('created_at');
        const box = getEl('commentList-' + articleId);
        box.innerHTML = (data||[]).map(c => `<p><b>${c.nickname}</b>: ${c.content} <small>${new Date(c.created_at).toLocaleTimeString()}</small></p>`).join('');
    }

    window.postComment = async function(articleId) {
        if(!currentUser) return toast('请先登录');
        const input = getEl('commentInput-' + articleId);
        if(!input.value.trim()) return;
        await supabase.from('comments').insert({ article_id: articleId, nickname: currentUser.nickname, content: input.value.trim() });
        input.value = '';
        loadComments(articleId);
    };

    window.publishArticle = function(cat) {
        const title = prompt('文章标题'), content = prompt('文章内容');
        if(!title || !content) return;
        supabase.from('articles').insert({ title, content, category: cat, author: currentUser.nickname }).then(({error}) => {
            if(error) toast('发布失败');
            else { toast('发布成功'); loadArticles(cat); }
        });
    };

    // 聊天
    window.joinRoom = function(roomName) {
        if(!currentUser) return toast('请先登录');
        currentRoom = 'oskwk-' + roomName;
        getEl('channelSelector').style.display = 'none';
        getEl('chatPanel').style.display = 'block';
        getEl('chatBox').innerHTML = '';
        loadChatMessages();
        subscribeToRoom();
    };

    window.promptCreateRoom = function() {
        const name = prompt('房间名称'), pwd = prompt('设置密码');
        if(!name || !pwd) return;
        const roomId = 'oskwk-' + name.replace(/\s+/g, '-');
        supabase.from('custom_rooms').insert({ room_name: roomId, password: pwd, creator_email: currentUser.email }).then(({error}) => {
            if(error) toast('创建失败');
            else { addCustomRoomCard(roomId, name); toast('房间创建成功'); }
        });
    };

    async function loadCustomRooms() {
        const { data } = await supabase.from('custom_rooms').select('room_name');
        (data||[]).forEach(r => addCustomRoomCard(r.room_name, r.room_name.replace('oskwk-','')));
    }

    function addCustomRoomCard(roomId, display) {
        const grid = document.getElementById('channelGrid');
        if([...grid.children].some(c => c.textContent.includes(display))) return;
        const card = document.createElement('div'); card.className = 'channel-card';
        card.onclick = async () => {
            const { data } = await supabase.from('custom_rooms').select('password').eq('room_name', roomId).single();
            const pwd = prompt('请输入房间密码');
            if(!data || pwd !== data.password) return toast('密码错误');
            joinRoom(roomId.replace('oskwk-', ''));
        };
        card.innerHTML = `🔒 ${display}`;
        grid.appendChild(card);
    }

    window.leaveRoom = function() { if(realtimeChannel) supabase.removeChannel(realtimeChannel); currentRoom = null; getEl('channelSelector').style.display = 'block'; getEl('chatPanel').style.display = 'none'; };

    async function loadChatMessages() {
        const { data } = await supabase.from('messages').select('*').eq('room', currentRoom).order('created_at');
        getEl('chatBox').innerHTML = ''; (data||[]).forEach(renderMessage);
    }

    function renderMessage(msg) {
        const div = document.createElement('div'); div.className = `msg ${msg.nickname===currentUser.nickname?'mine':'other'}`;
        div.innerHTML = `<b>${msg.nickname}</b><br>${msg.message||''}${msg.image_url?`<br><img src="${msg.image_url}" style="max-width:200px; border-radius:1rem;">`:''}<span class="time" style="font-size:0.7rem; opacity:0.6;">${new Date(msg.created_at).toLocaleTimeString()}</span>`;
        getEl('chatBox').appendChild(div);
        getEl('chatBox').scrollTop = getEl('chatBox').scrollHeight;
    }

    function subscribeToRoom() {
        if(realtimeChannel) supabase.removeChannel(realtimeChannel);
        realtimeChannel = supabase.channel('room-'+currentRoom).on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`room=eq.${currentRoom}` }, payload => renderMessage(payload.new)).subscribe();
    }

    window.sendMsg = async function() {
        const text = getEl('msgInput').value.trim();
        if(!text || !currentRoom) return;
        await supabase.from('messages').insert({ room: currentRoom, nickname: currentUser.nickname, message: text });
        getEl('msgInput').value = '';
    };

    // 图片上传 - 只用 apikey，不发送 Authorization 头
    window.uploadImg = async function() {
        if(!currentUser || !currentRoom) return toast('请先登录并加入房间');
        const file = getEl('imgUpload').files[0];
        if(!file) return;
        if(file.size > 5*1024*1024) return toast('图片不能超过5MB');

        const fileExt = file.name.split('.').pop();
        const path = currentRoom + '/' + Date.now() + '.' + fileExt;
        const { data, error } = await supabase.storage
            .from('CHAT-INMAGES')
            .upload(path, file, { cacheControl: '3600', upsert: false });

        if(error) {
            console.error('上传错误：', error);
            toast('上传失败: ' + (error.message || '请检查桶名或策略'));
            return;
        }

        const { publicURL } = supabase.storage.from('CHAT-INMAGES').getPublicUrl(path);
        const { error: msgErr } = await supabase.from('messages').insert({
            room: currentRoom, nickname: currentUser.nickname, image_url: publicURL
        });
        if(msgErr) toast('消息发送失败');
        getEl('imgUpload').value = '';
    };

    window.showAllUsers = async function() {
        if(currentUser.email !== ADMIN_EMAIL) return;
        const { data } = await supabase.from('profiles').select('*');
        if(!data) return toast('暂无用户');
        alert('所有用户：\n'+data.map(u => `${u.email} - ${u.nickname} - ${new Date(u.created_at).toLocaleDateString()}`).join('\n'));
    };

    // 粒子背景
    const canvas = document.getElementById('particles'), ctx = canvas.getContext('2d');
    let width, height;
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    const particles = Array.from({length:70}, () => ({ x:Math.random()*width, y:Math.random()*height, r:Math.random()*2, sx:(Math.random()-0.5)*0.3, sy:(Math.random()-0.5)*0.3 }));
    function animate() {
        ctx.clearRect(0,0,width,height);
        particles.forEach(p => {
            p.x += p.sx; p.y += p.sy;
            if(p.x<0||p.x>width||p.y<0||p.y>height) { p.x=Math.random()*width; p.y=Math.random()*height; }
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.fill();
        });
        requestAnimationFrame(animate);
    }
    animate();

    // 启动
    window.addEventListener('load', () => {
        const saved = localStorage.getItem('oskwk_user');
        if(saved) { try { currentUser = JSON.parse(saved); enterApp(); } catch(e) { localStorage.removeItem('oskwk_user'); getEl('loading').style.display = 'none'; } }
        else setTimeout(() => getEl('loading').style.display = 'none', 800);
    });
})();
</script>
</body>
</html>
