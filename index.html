<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>oskwk · 极致化平台</title>
    <style>
        :root {
            --bg: rgba(255,255,255,0.5);
            --surface: rgba(255,255,255,0.7);
            --text-primary: #0a0a0a;
            --text-secondary: #444;
            --accent: #4f46e5;
            --accent-light: rgba(79,70,229,0.1);
            --border: rgba(0,0,0,0.06);
            --radius-xl: 28px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
            color: var(--text-primary); min-height:100vh; line-height:1.5;
        }
        body::before {
            content:''; position:fixed; inset:0; background: rgba(0,0,0,0.25); backdrop-filter: blur(6px); z-index:-1;
        }
        .hero {
            height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
            color:#fff; text-align:center; background: linear-gradient(135deg, rgba(79,70,229,0.6), rgba(236,72,153,0.5));
            position:relative;
        }
        .hero h1 { font-size:clamp(40px,10vw,80px); text-shadow:0 4px 30px rgba(0,0,0,0.3); }
        .hero button {
            background:#fff; color:var(--accent); padding:16px 48px; border-radius:60px; border:none; font-size:18px;
            font-weight:600; cursor:pointer; margin-top:40px; transition:0.2s;
        }
        .toast {
            position:fixed; top:100px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.8); color:#fff;
            padding:12px 28px; border-radius:60px; z-index:999; display:none;
        }
        .main { display:none; padding:80px 20px 40px; max-width:1200px; margin:0 auto; }
        .main.active { display:block; }
        .nav {
            position:fixed; top:0; left:0; right:0; z-index:50; background:rgba(255,255,255,0.6); backdrop-filter:blur(30px);
            display:flex; gap:8px; padding:12px 20px; overflow-x:auto; border-bottom:1px solid rgba(255,255,255,0.2);
        }
        .nav span { font-weight:700; font-size:20px; color:var(--accent); margin-right:12px; }
        .nav button { background:none; border:none; color:#333; padding:10px 18px; border-radius:40px; cursor:pointer; }
        .nav button.active { background:rgba(79,70,229,0.15); color:var(--accent); }
        .page { display:none; }
        .page.active { display:block; }
        .pg-hero {
            height:260px; border-radius:24px; margin-bottom:20px; display:flex; align-items:center; justify-content:center;
            color:#fff; font-size:36px; font-weight:700; background-size:cover; position:relative; overflow:hidden;
        }
        .pg-hero::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.3); }
        .pg-hero span { position:relative; z-index:1; }
        .card {
            background:rgba(255,255,255,0.6); backdrop-filter:blur(25px); border-radius:24px; padding:36px;
            margin-bottom:20px; border:1px solid rgba(255,255,255,0.5); box-shadow:0 8px 32px rgba(0,0,0,0.08);
        }
        .item { background:rgba(255,255,255,0.4); border-radius:18px; padding:24px; margin-bottom:16px; }
        .comment-box { margin-top:12px; padding-top:12px; border-top:1px solid #eee; }
        .comment-input { display:flex; gap:8px; margin-top:12px; }
        .comment-input input { flex:1; padding:12px; border-radius:12px; border:1px solid #ccc; }
        .ch-grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); }
        .ch-card {
            background:rgba(255,255,255,0.5); backdrop-filter:blur(16px); padding:20px; border-radius:18px; cursor:pointer;
            display:flex; align-items:center; gap:12px;
        }
        .msg { max-width:80%; padding:12px 16px; border-radius:20px; margin-bottom:8px; position:relative; }
        .msg.mine { align-self:flex-end; background:var(--accent); color:#fff; }
        .msg.other { align-self:flex-start; background:#fff; }
        .time { font-size:10px; opacity:0.7; margin-top:4px; display:block; text-align:right; }
    </style>
</head>
<body>
<div class="loading" id="loading" style="position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;font-size:48px;z-index:999;">oskwk</div>

<section class="hero" id="hero">
    <h1>专注于每一个细节<br>呈现极致视觉体验</h1>
    <button onclick="openModal()">加入我们 →</button>
</section>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); backdrop-filter:blur(10px); z-index:200; align-items:center; justify-content:center;" onclick="if(event.target===this)closeModal()">
    <div style="background:rgba(255,255,255,0.95); border-radius:28px; padding:40px; max-width:420px; width:100%;">
        <h2 style="text-align:center;">加入 oskwk</h2>
        <form onsubmit="register(event)">
            <input type="email" id="email" placeholder="邮箱" required style="width:100%;padding:14px;margin:12px 0;border-radius:12px;border:1px solid #ddd;">
            <input type="text" id="nickname" placeholder="昵称" required style="width:100%;padding:14px;margin:12px 0;border-radius:12px;border:1px solid #ddd;">
            <button type="submit" style="width:100%;padding:16px;background:#4f46e5;color:#fff;border:none;border-radius:12px;">确认加入</button>
        </form>
        <button onclick="closeModal()" style="margin-top:12px;width:100%;background:#eee;">取消</button>
    </div>
</div>

<div class="main" id="main">
    <nav class="nav">
        <span>oskwk</span>
        <button class="active" onclick="showTab(0)">文章</button>
        <button onclick="showTab(1)">交流中心</button>
        <button onclick="showTab(2)">个人</button>
    </nav>

    <!-- 文章页 -->
    <div class="page active" id="tab0">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1200&q=80')"><span>探索与发现</span></div>
        <div class="card" id="articleListCard">
            <button id="writeArticleBtn" class="btn-write" style="display:none;">✍️ 发布文章</button>
            <div id="articleList"></div>
        </div>
    </div>

    <!-- 交流中心 -->
    <div class="page" id="tab1">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1518837695005-2083093ee35b?auto=format&fit=crop&w=1200&q=80')"><span>交流中心</span></div>
        <div class="card">
            <div id="channelList">
                <div class="ch-grid">
                    <div class="ch-card" onclick="enterChannel('大厅')">🏠 大厅</div>
                    <div class="ch-card" onclick="enterChannel('技术')">💻 技术</div>
                    <div class="ch-card" onclick="enterPrivate()">🔒 私有房间</div>
                </div>
            </div>
            <div id="chatRoom" style="display:none;">
                <button onclick="leaveChannel()" style="margin-bottom:10px;">← 返回</button>
                <div id="messagesBox" style="height:60vh; overflow-y:auto; background:rgba(255,255,255,0.3); border-radius:20px; padding:16px;"></div>
                <div style="display:flex; gap:8px; margin-top:12px;">
                    <input id="messageInput" placeholder="说点什么..." style="flex:1; padding:14px; border-radius:20px; border:1px solid #ccc;">
                    <button onclick="document.getElementById('imageUpload').click()">📷</button>
                    <input type="file" id="imageUpload" accept="image/*" style="display:none" onchange="uploadImage()">
                    <button onclick="sendText()">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 个人中心 -->
    <div class="page" id="tab2">
        <div class="pg-hero" style="background-image:url('https://images.unsplash.com/photo-1504711434969-e33886168d6c?auto=format&fit=crop&w=1200&q=80')"><span>个人中心</span></div>
        <div class="card">
            <h2 id="profileName">昵称</h2>
            <p id="profileEmail">email</p>
            <button onclick="logout()" style="margin-top:20px; padding:12px 24px; background:#ef4444; color:#fff; border:none; border-radius:12px;">退出</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const supabase = window.supabase.createClient(
        'https://ouejetzclopuuafmnbjq.supabase.co',
        'sb_publishable_y72GfgNeGAGShil7rmurrQ_U3w_QeJL'
    );
    let currentUser = null;
    let currentRoom = null;
    let messageSub = null;
    const ADMIN_EMAIL = 'admin@oskwk.com';   // 改成你自己的邮箱，即管理员

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.display='block';
        setTimeout(() => t.style.display='none', 3000);
    }

    // 注册
    window.openModal = () => document.getElementById('modal').style.display='flex';
    window.closeModal = () => document.getElementById('modal').style.display='none';
    window.register = async function(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim();
        const nick = document.getElementById('nickname').value.trim();
        if(!email || !nick) return toast('请填写完整');
        currentUser = { email, nickname: nick, created_at: new Date().toISOString() };
        localStorage.setItem('oskwk_user', JSON.stringify(currentUser));
        document.getElementById('modal').style.display='none';
        enterSite();
    };

    function enterSite() {
        document.getElementById('loading').style.display='none';
        document.getElementById('main').classList.add('active');
        document.getElementById('hero').style.display='none';
        updateProfile();
        loadArticles();
        // 管理员显示发布按钮
        if(currentUser && currentUser.email === ADMIN_EMAIL) {
            document.getElementById('writeArticleBtn').style.display = 'block';
            document.getElementById('writeArticleBtn').onclick = showEditor;
        }
    }

    window.showTab = function(i) {
        document.querySelectorAll('.page').forEach((p,idx) => p.classList.toggle('active', idx===i));
        document.querySelectorAll('.nav button').forEach((b,idx) => b.classList.toggle('active', idx===i));
    };

    function updateProfile() {
        if(!currentUser) return;
        document.getElementById('profileName').textContent = currentUser.nickname;
        document.getElementById('profileEmail').textContent = currentUser.email;
    }

    // 文章加载与发布（管理员专用）
    async function loadArticles() {
        const { data } = await supabase.from('articles').select('*').order('created_at', {ascending:false});
        const list = document.getElementById('articleList');
        if(!data || data.length===0) { list.innerHTML='<p>暂无文章</p>'; return; }
        list.innerHTML = data.map(a => `
            <div class="item">
                <h3>${a.title}</h3><p>${a.content}</p>
                <small>作者：${a.author} · ${new Date(a.created_at).toLocaleString()}</small>
                <div class="comment-box" id="comments-${a.id}">
                    <strong>留言</strong>
                    <div class="comment-list" id="commentList-${a.id}"></div>
                    <div class="comment-input">
                        <input id="commentInput-${a.id}" placeholder="写下你的想法...">
                        <button onclick="addComment(${a.id})">发送</button>
                    </div>
                </div>
            </div>
        `).join('');
        // 加载每条文章的留言
        data.forEach(a => loadComments(a.id));
    }
    async function loadComments(articleId) {
        const { data } = await supabase.from('comments').select('*').eq('article_id', articleId).order('created_at');
        const box = document.getElementById('commentList-'+articleId);
        if(!box) return;
        box.innerHTML = (data||[]).map(c => `<p><b>${c.nickname}</b>: ${c.content} <small>${new Date(c.created_at).toLocaleTimeString()}</small></p>`).join('');
    }
    window.addComment = async function(articleId) {
        if(!currentUser) return toast('请先登录');
        const input = document.getElementById('commentInput-'+articleId);
        const content = input.value.trim();
        if(!content) return;
        await supabase.from('comments').insert({ article_id: articleId, nickname: currentUser.nickname, content });
        input.value = '';
        loadComments(articleId);
    };
    function showEditor() {
        const title = prompt('文章标题');
        if(!title) return;
        const content = prompt('文章内容');
        if(!content) return;
        supabase.from('articles').insert({ title, content, category:'general', author: currentUser.nickname }).then(() => loadArticles());
    }

    // 聊天功能
    window.enterChannel = function(room) {
        if(!currentUser) return toast('请先登录');
        currentRoom = 'oskwk-'+room;
        document.getElementById('channelList').style.display='none';
        document.getElementById('chatRoom').style.display='block';
        loadMessages();
        subscribeRoom();
    };
    window.enterPrivate = function() {
        const name = prompt('房间名称');
        if(!name) return;
        const pwd = prompt('请输入密码（默认：oskwk2024）', 'oskwk2024');
        if(pwd !== 'oskwk2024') return toast('密码错误');
        enterChannel('私人-'+name);
    };
    window.leaveChannel = function() {
        if(messageSub) supabase.removeChannel(messageSub);
        currentRoom = null;
        document.getElementById('channelList').style.display='block';
        document.getElementById('chatRoom').style.display='none';
        document.getElementById('messagesBox').innerHTML = '';
    };
    async function loadMessages() {
        if(!currentRoom) return;
        const { data } = await supabase.from('messages').select('*').eq('room', currentRoom).order('created_at');
        const box = document.getElementById('messagesBox');
        box.innerHTML = '';
        (data||[]).forEach(m => renderMsg(m));
    }
    function renderMsg(m) {
        const box = document.getElementById('messagesBox');
        const div = document.createElement('div');
        div.className = `msg ${m.nickname===currentUser.nickname?'mine':'other'}`;
        let content = `<b>${m.nickname}</b><br>`;
        if(m.message) content += m.message;
        if(m.image_url) content += `<br><img src="${m.image_url}" style="max-width:200px;border-radius:12px;">`;
        content += `<span class="time">${new Date(m.created_at).toLocaleTimeString()}</span>`;
        div.innerHTML = content;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }
    function subscribeRoom() {
        if(!currentRoom) return;
        if(messageSub) supabase.removeChannel(messageSub);
        messageSub = supabase.channel('room-'+currentRoom)
            .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`room=eq.${currentRoom}` },
                payload => renderMsg(payload.new) )
            .subscribe();
    }
    window.sendText = function() {
        if(!currentUser || !currentRoom) return toast('请先登录并加入频道');
        const text = document.getElementById('messageInput').value.trim();
        if(!text) return;
        supabase.from('messages').insert({ room: currentRoom, nickname: currentUser.nickname, message: text });
        document.getElementById('messageInput').value = '';
    };
    window.uploadImage = function() {
        if(!currentUser || !currentRoom) return toast('请先登录并加入频道');
        const file = document.getElementById('imageUpload').files[0];
        if(!file) return;
        if(file.size > 5*1024*1024) return toast('图片不能超过5MB');
        const path = currentRoom+'/'+Date.now()+'_'+file.name;
        supabase.storage.from('CHAT-INMAGES').upload(path, file)
            .then(({ error }) => {
                if(error) {
                    if(error.message.includes('bucket') || error.message.includes('not found'))
                        toast('请先在 Supabase 创建名为 CHAT-INMAGES 的公开存储桶');
                    else toast('上传失败：'+error.message);
                    return;
                }
                const { data: { publicUrl } } = supabase.storage.from('CHAT-INMAGES').getPublicUrl(path);
                supabase.from('messages').insert({ room:currentRoom, nickname:currentUser.nickname, image_url:publicUrl });
            });
        document.getElementById('imageUpload').value = '';
    };

    window.logout = function() {
        localStorage.removeItem('oskwk_user');
        location.reload();
    };

    // 自动恢复登录
    window.addEventListener('load', () => {
        setTimeout(() => {
            const saved = localStorage.getItem('oskwk_user');
            if(saved) {
                currentUser = JSON.parse(saved);
                enterSite();
            } else {
                document.getElementById('loading').style.display='none';
            }
        }, 800);
    });
})();
</script>
</body>
</html>
